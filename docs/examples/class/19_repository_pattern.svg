<svg xmlns="http://www.w3.org/2000/svg" width="760" height="232" viewBox="0 0 760 232"><rect width="100%" height="100%" fill="white"/><defs><marker id="arrow-open" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10" fill="none" stroke="#1e293b" stroke-width="1.5"/></marker><marker id="arrow-triangle" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse"><path d="M0,0 L12,6 L0,12 z" fill="white" stroke="#1e293b" stroke-width="1.5"/></marker><marker id="arrow-diamond-filled" viewBox="0 0 14 10" refX="13" refY="5" markerWidth="14" markerHeight="10" orient="auto-start-reverse"><path d="M0,5 L7,0 L14,5 L7,10 z" fill="#1e293b" stroke="#1e293b" stroke-width="1"/></marker><marker id="arrow-diamond-open" viewBox="0 0 14 10" refX="13" refY="5" markerWidth="14" markerHeight="10" orient="auto-start-reverse"><path d="M0,5 L7,0 L14,5 L7,10 z" fill="white" stroke="#1e293b" stroke-width="1"/></marker></defs><text x="32" y="32" font-family="monospace" font-size="18" font-weight="600" fill="#0f172a">Repository Pattern</text><line x1="280" y1="123" x2="232" y2="119" stroke="#1e293b" stroke-width="1.5" marker-start="url(#arrow-triangle)"/><line x1="480" y1="123" x2="528" y2="119" stroke="#1e293b" stroke-width="1.5" marker-end="url(#arrow-open)"/><rect x="32" y="66" width="200" height="94" rx="4" ry="4" fill="#ffffff" stroke="#1e293b" stroke-width="1.5"/><rect x="32" y="66" width="200" height="30" rx="4" ry="4" fill="#dbeafe" stroke="#1e293b" stroke-width="1.5"/><line x1="32" y1="96" x2="232" y2="96" stroke="#1e293b" stroke-width="1"/><text x="132" y="87" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#0f172a">Repository</text><text x="42" y="112" font-family="monospace" font-size="11" fill="#16a34a">+findById(id)</text><text x="42" y="128" font-family="monospace" font-size="11" fill="#16a34a">+findAll(): List</text><text x="42" y="144" font-family="monospace" font-size="11" fill="#16a34a">+save(entity): void</text><rect x="280" y="66" width="200" height="126" rx="4" ry="4" fill="#ffffff" stroke="#1e293b" stroke-width="1.5"/><rect x="280" y="66" width="200" height="30" rx="4" ry="4" fill="#dbeafe" stroke="#1e293b" stroke-width="1.5"/><line x1="280" y1="96" x2="480" y2="96" stroke="#1e293b" stroke-width="1"/><text x="380" y="87" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#0f172a">UserRepository</text><text x="290" y="112" font-family="monospace" font-size="11" fill="#dc2626">-db: Database</text><text x="290" y="128" font-family="monospace" font-size="11" fill="#16a34a">+findById(id: Long)</text><text x="290" y="144" font-family="monospace" font-size="11" fill="#16a34a">+findAll(): List</text><text x="290" y="160" font-family="monospace" font-size="11" fill="#16a34a">+findByEmail(email: String)</text><text x="290" y="176" font-family="monospace" font-size="11" fill="#16a34a">+save(user: User): User</text><rect x="528" y="66" width="200" height="94" rx="4" ry="4" fill="#ffffff" stroke="#1e293b" stroke-width="1.5"/><rect x="528" y="66" width="200" height="30" rx="4" ry="4" fill="#dbeafe" stroke="#1e293b" stroke-width="1.5"/><line x1="528" y1="96" x2="728" y2="96" stroke="#1e293b" stroke-width="1"/><text x="628" y="87" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#0f172a">User</text><text x="538" y="112" font-family="monospace" font-size="11" fill="#dc2626">-id: Long</text><text x="538" y="128" font-family="monospace" font-size="11" fill="#dc2626">-name: String</text><text x="538" y="144" font-family="monospace" font-size="11" fill="#dc2626">-email: String</text></svg>