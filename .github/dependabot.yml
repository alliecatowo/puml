# Dependabot configuration for PUML.
# - Cargo (Rust): weekly updates with grouped patches for minor versions.
# - GitHub Actions: weekly updates (covers actions in .github/workflows + .github/actions).
# - npm (Studio SPA / VS Code extension, if present).
#
# Strategy: group minor + patch bumps to reduce PR churn; surface majors
# individually so they can be reviewed deliberately.

version: 2
updates:
  # Cargo workspace (root + crates/*)
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "cargo"
      include: scope
    groups:
      patch-updates:
        update-types:
          - patch
      minor-updates:
        update-types:
          - minor
        # Keep majors separate so we can review breaking changes individually.
    ignore:
      # Examples — keep manual control over major version bumps for crates
      # whose API changes affect public surface.
      - dependency-name: "syn"
        update-types: ["version-update:semver-major"]
      - dependency-name: "proc-macro2"
        update-types: ["version-update:semver-major"]

  # GitHub Actions (.github/workflows + .github/actions)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope
    groups:
      action-updates:
        update-types:
          - patch
          - minor

  # npm for Studio SPA site (if/when package.json appears)
  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
      - site
    commit-message:
      prefix: "site"
      include: scope
    groups:
      patch-updates:
        update-types: [patch]
      minor-updates:
        update-types: [minor]

  # npm for VS Code extension
  - package-ecosystem: npm
    directory: /extensions/vscode
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
      - vscode
    commit-message:
      prefix: "vscode"
      include: scope
    groups:
      patch-updates:
        update-types: [patch]
      minor-updates:
        update-types: [minor]
