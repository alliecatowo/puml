name: PR Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  changes:
    name: classify changed files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      run_full_gate: ${{ steps.changes.outputs.run_full_gate }}
      run_wasm_check: ${{ steps.changes.outputs.run_wasm_check }}
      run_site_smoke: ${{ steps.changes.outputs.run_site_smoke }}
      run_wasm_site_smoke: ${{ steps.changes.outputs.run_wasm_site_smoke }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          CHANGED_FILES="${RUNNER_TEMP}/changed-files.txt"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if ! git cat-file -e "${{ github.event.pull_request.base.sha }}^{commit}" 2>/dev/null; then
              git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
            fi
            git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD > "${CHANGED_FILES}"
          else
            git ls-files > "${CHANGED_FILES}"
          fi
          python3 scripts/ci-classify-changes.py \
            --changed-files "${CHANGED_FILES}" \
            --github-output "${GITHUB_OUTPUT}" | tee "${RUNNER_TEMP}/ci-classification.txt"
          sed 's/^/  - /' "${CHANGED_FILES}"

      - name: Fast path for docs-only changes
        if: steps.changes.outputs.run_full_gate != 'true'
        run: echo "Docs-only change; skipping Rust/coverage/wasm/visual gates."

  # Lint: fmt + clippy + structural guardrails + docs-examples drift.
  # One job, one cache-restore. docs drift is a single Python call.
  lint:
    name: lint (fmt + clippy)
    needs: changes
    if: needs.changes.outputs.run_full_gate == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pr-gate-ubuntu-stable
          cache-on-failure: true
      - name: rust file-size guardrail
        run: python3 ./scripts/check_rust_file_sizes.py --fail-on-violations
      - name: renderer boundary guardrail
        run: python3 ./scripts/check_renderer_boundaries.py --fail-on-violations
      - name: fmt gate
        run: cargo fmt --check
      - name: clippy gate
        run: cargo clippy --all-targets --all-features -- -D warnings
      # Detect committed SVG artifact drift; authors run scripts/regen-artifacts.sh --force
      # locally to fix. artifact_regen auto-commit loop lives in main-gate only.
      - name: docs examples drift gate
        run: python3 ./scripts/render_check.py --quick --quiet --fail-on-doc-drift

  # Test + coverage: single job runs the full suite under llvm-cov instrumentation.
  # One compile pass does BOTH test execution AND coverage measurement — the R10
  # win. We dropped per-shard partition (broken: each shard saw only ~half the
  # codebase exercised, naturally underreporting coverage vs the full-codebase
  # threshold). Single job keeps the win without the false-fail.
  #
  # Wall-time estimate: ~4:30-5:00 warm cache (instrumented compile + ~2000 tests).
  # Critical path: lint ∥ test ∥ binary_size → required_check ~5:00.
  test:
    name: test (full suite + coverage)
    needs: changes
    if: needs.changes.outputs.run_full_gate == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - run: df -h
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          # Dedicated key: instrumented artifacts must not evict stable build cache.
          shared-key: pr-gate-ubuntu-coverage
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: test + coverage gate
        # Skip the coverage threshold check for bot dependency updaters; their PRs
        # don't change logic and tend to fluctuate coverage by accidental amounts.
        run: |
          set -euo pipefail
          COVERAGE_IGNORE_REGEX='src/(main|bin/puml-lsp|lib|parser|preproc|normalize|render|specialized)\.rs|src/(frontend|normalize|parser|render|specialized)/.*\.rs'
          ACTOR="${{ github.actor }}"
          if [[ "${ACTOR}" == "dependabot[bot]" || "${ACTOR}" == "renovate[bot]" ]]; then
            FAIL_UNDER_FLAG=""
          else
            FAIL_UNDER_FLAG="--fail-under-lines 87"
          fi
          cargo llvm-cov nextest \
            --profile ci \
            --all-features --package puml \
            ${FAIL_UNDER_FLAG} \
            --ignore-filename-regex "${COVERAGE_IGNORE_REGEX}"
      - name: doc test gate
        run: cargo test --doc
      - name: Upload visual diff artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-visual-smoke-${{ github.run_number }}
          path: target/visual-diff
          if-no-files-found: ignore
          retention-days: 14

  # Main parity: use the release profile and the same binary/perf gate checks as main-gate.
  # Runs in parallel with test shards.
  binary_size:
    name: binary size
    needs: changes
    if: needs.changes.outputs.run_full_gate == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BINARY_LIMIT_BYTES: "16000000"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pr-gate-ubuntu-stable
          cache-on-failure: true
      - name: Build release binary
        run: cargo build --release -p puml --locked --bin puml
      - name: Binary size + perf gate
        shell: bash
        run: |
          set -euo pipefail
          BINARY="target/release/puml"
          if stat -f%z "${BINARY}" >/dev/null 2>&1; then BYTES=$(stat -f%z "${BINARY}")
          else BYTES=$(stat -c%s "${BINARY}"); fi
          echo "Binary size (release profile): ${BYTES} bytes (limit ${BINARY_LIMIT_BYTES})"
          if (( BYTES > BINARY_LIMIT_BYTES )); then
            echo "ERROR: Binary size ${BYTES}B exceeds limit ${BINARY_LIMIT_BYTES}B" >&2; exit 1
          fi
          ./scripts/bench.sh --skip-build --enforce-gates

  wasm:
    name: wasm
    needs: changes
    if: needs.changes.outputs.run_wasm_check == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: pr-gate-ubuntu-stable
          cache-on-failure: true
      - name: wasm check
        run: cargo check --target wasm32-unknown-unknown -p puml-wasm --locked

  site_smoke:
    name: site graph toggle smoke
    needs: changes
    if: needs.changes.outputs.run_site_smoke == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
        if: needs.changes.outputs.run_wasm_site_smoke == 'true'
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        if: needs.changes.outputs.run_wasm_site_smoke == 'true'
        with:
          shared-key: pr-gate-ubuntu-stable
          cache-on-failure: true
      - name: Install Zola
        run: |
          set -euo pipefail
          ZOLA_VERSION=0.19.2
          mkdir -p "${RUNNER_TEMP}/zola"
          curl -fsSL -o /tmp/zola.tar.gz \
            "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf /tmp/zola.tar.gz -C "${RUNNER_TEMP}/zola"
          echo "${RUNNER_TEMP}/zola" >> "${GITHUB_PATH}"
          "${RUNNER_TEMP}/zola/zola" --version
      - uses: ./.github/actions/install-wasm-pack
        if: needs.changes.outputs.run_wasm_site_smoke == 'true'
      - name: site graph toggle smoke
        run: |
          if [[ "${{ needs.changes.outputs.run_wasm_site_smoke }}" == "true" ]]; then
            ./scripts/site-smoke.sh --build-wasm --require-wasm
          else
            ./scripts/site-smoke.sh
          fi
      - name: Upload site smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-site-smoke-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            target/site-smoke
            site/public

  # Aggregator: posts "fmt-clippy-test-coverage-quick" commit status for branch protection.
  # Branch protection requires this exact check name — do not rename without updating the rule.
  required_check:
    name: fmt-clippy-test-coverage-quick
    needs: [changes, lint, test, binary_size, wasm, site_smoke]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      statuses: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TARGET_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      RUN_FULL_GATE: ${{ needs.changes.outputs.run_full_gate }}
      RUN_WASM_CHECK: ${{ needs.changes.outputs.run_wasm_check }}
      RUN_SITE_SMOKE: ${{ needs.changes.outputs.run_site_smoke }}
      CHANGES_RESULT: ${{ needs.changes.result }}
      LINT_RESULT: ${{ needs.lint.result }}
      TEST_RESULT: ${{ needs.test.result }}
      BINARY_SIZE_RESULT: ${{ needs.binary_size.result }}
      WASM_RESULT: ${{ needs.wasm.result }}
      SITE_SMOKE_RESULT: ${{ needs.site_smoke.result }}

    steps:
      - name: Summarize PR gate
        id: summarize
        shell: bash
        run: |
          set -euo pipefail
          failures=()
          require_success() {
            local label="$1" result="$2"
            [[ "${result}" == "success" ]] || failures+=("${label}: got ${result}")
          }
          require_success "changes" "${CHANGES_RESULT}"
          if [[ "${RUN_FULL_GATE}" == "true" ]]; then
            require_success "lint" "${LINT_RESULT}"
            require_success "test" "${TEST_RESULT}"
            require_success "binary size" "${BINARY_SIZE_RESULT}"
          fi
          [[ "${RUN_WASM_CHECK}" == "true" ]] && require_success "wasm" "${WASM_RESULT}"
          [[ "${RUN_SITE_SMOKE}" == "true" ]] && require_success "site smoke" "${SITE_SMOKE_RESULT}"
          if (( ${#failures[@]} > 0 )); then
            echo "state=failure" >> "${GITHUB_OUTPUT}"
            echo "description=PR gate failed; inspect workflow summary." >> "${GITHUB_OUTPUT}"
          else
            echo "state=success" >> "${GITHUB_OUTPUT}"
            echo "description=PR gate passed." >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish required status context
        shell: bash
        env:
          STATUS_STATE: ${{ steps.summarize.outputs.state }}
          STATUS_DESCRIPTION: ${{ steps.summarize.outputs.description }}
        run: |
          gh api --method POST "repos/${{ github.repository }}/statuses/${TARGET_SHA}" \
            -f state="${STATUS_STATE}" \
            -f context="fmt-clippy-test-coverage-quick" \
            -f description="${STATUS_DESCRIPTION}" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Fail when any required shard failed
        if: steps.summarize.outputs.state != 'success'
        run: |
          printf 'PR gate failed:\n  - %s\n' "${{ steps.summarize.outputs.description }}" >&2
          exit 1
