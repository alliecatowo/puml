name: PR Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  changes:
    name: classify changed files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      run_full_gate: ${{ steps.changes.outputs.run_full_gate }}
      docs_examples_changed: ${{ steps.changes.outputs.docs_examples_changed }}
      run_docs_examples_drift: ${{ steps.changes.outputs.run_docs_examples_drift }}
      run_artifact_regen: ${{ steps.changes.outputs.run_artifact_regen }}
      run_wasm_check: ${{ steps.changes.outputs.run_wasm_check }}
      run_site_smoke: ${{ steps.changes.outputs.run_site_smoke }}
      run_wasm_site_smoke: ${{ steps.changes.outputs.run_wasm_site_smoke }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          CHANGED_FILES="${RUNNER_TEMP}/changed-files.txt"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if ! git cat-file -e "${{ github.event.pull_request.base.sha }}^{commit}" 2>/dev/null; then
              git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
            fi
            git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD > "${CHANGED_FILES}"
          else
            git ls-files > "${CHANGED_FILES}"
          fi

          python3 scripts/ci-classify-changes.py \
            --changed-files "${CHANGED_FILES}" \
            --github-output "${GITHUB_OUTPUT}" | tee "${RUNNER_TEMP}/ci-classification.txt"

          echo "Changed files:"
          sed 's/^/  - /' "${CHANGED_FILES}"
          cat "${RUNNER_TEMP}/ci-classification.txt"

      - name: Fast path for docs-only changes
        if: steps.changes.outputs.run_full_gate != 'true'
        run: |
          echo "Docs-only change set detected outside docs/examples; skipping Rust, coverage, wasm, visual, and docs-example drift gates."
          echo "Site graph-toggle smoke will still run when documentation/site files can affect rendered docs."

  artifact_regen:
    name: artifact regen
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.run_artifact_regen == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write
      actions: write
    outputs:
      pushed_regen_commit: ${{ steps.commit.outputs.pushed_regen_commit }}

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: pr-gate-ubuntu-stable
          cache-on-failure: true

      - name: Build puml CLI binary for artifact regen
        run: cargo build --release --bin puml

      - name: Regenerate committed diagram artifacts
        run: ./scripts/regen-artifacts.sh --force

      - name: Commit regenerated artifacts when drift is detected
        id: commit
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if git diff --quiet -- docs/examples docs/diagrams; then
            echo "No regenerated artifact drift detected."
            echo "pushed_regen_commit=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/examples docs/diagrams
          git commit -m "chore(ci): regenerate diagram artifacts"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          gh workflow run pr-gate.yml --ref "${{ github.event.pull_request.head.ref }}"
          echo "pushed_regen_commit=true" >> "${GITHUB_OUTPUT}"

  skip_after_regen_push:
    name: skip after regen push
    needs: [changes, artifact_regen]
    if: always() && needs.artifact_regen.outputs.pushed_regen_commit == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Explain why the heavy gate is skipped
        run: |
          echo "Artifact regeneration produced a commit on the PR branch."
          echo "The synchronize rerun will execute the expensive CI checks once against the updated branch."

  fmt:
    name: fmt
    needs: [changes, artifact_regen]
    if: always() && needs.changes.outputs.run_full_gate == 'true' && needs.artifact_regen.outputs.pushed_regen_commit != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: pr-gate-ubuntu-stable
          cache-on-failure: true

      - name: fmt gate
        run: cargo fmt --check

  rust_file_size:
    name: rust file size
    needs: [changes, artifact_regen]
    if: always() && needs.changes.outputs.run_full_gate == 'true' && needs.artifact_regen.outputs.pushed_regen_commit != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Rust file-size guardrail
        run: python3 ./scripts/check_rust_file_sizes.py --fail-on-violations

  clippy:
    name: clippy
    needs: [changes, artifact_regen]
    if: always() && needs.changes.outputs.run_full_gate == 'true' && needs.artifact_regen.outputs.pushed_regen_commit != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: pr-gate-ubuntu-stable
          cache-on-failure: true

      - name: clippy gate
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test
    needs: [changes, artifact_regen]
    if: always() && needs.changes.outputs.run_full_gate == 'true' && needs.artifact_regen.outputs.pushed_regen_commit != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: pr-gate-ubuntu-stable
          cache-on-failure: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: test gate
        run: cargo nextest run

      - name: doc test gate
        run: cargo test --doc

      - name: Upload visual regression artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-visual-smoke-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: target/visual-diff

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-benchmarks-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            docs/benchmarks/latest.md
            docs/benchmarks/latest.csv
            docs/benchmarks/latest.json
            docs/benchmarks/latest_trend.md
            docs/benchmarks/latest_trend.json

  wasm:
    name: wasm
    needs: [changes, artifact_regen]
    if: always() && needs.changes.outputs.run_wasm_check == 'true' && needs.artifact_regen.outputs.pushed_regen_commit != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: pr-gate-ubuntu-stable
          cache-on-failure: true

      - name: wasm check
        run: cargo check --target wasm32-unknown-unknown -p puml-wasm

  coverage:
    name: coverage
    needs: [changes, artifact_regen]
    if: always() && needs.changes.outputs.run_full_gate == 'true' && needs.artifact_regen.outputs.pushed_regen_commit != 'true' && github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: pr-gate-ubuntu-stable
          cache-on-failure: true

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: coverage gate
        run: cargo llvm-cov --all-features --workspace --fail-under-lines 83 --ignore-filename-regex 'src/(main|bin/puml-lsp|lib|parser|preproc|normalize|render|specialized)\.rs|src/(frontend|normalize|parser|render|specialized)/.*\.rs'

  docs_examples_drift:
    name: docs examples drift
    needs: [changes, artifact_regen]
    if: always() && needs.changes.outputs.run_docs_examples_drift == 'true' && needs.artifact_regen.outputs.pushed_regen_commit != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: pr-gate-ubuntu-stable
          cache-on-failure: true

      - name: docs examples drift gate
        run: python3 ./scripts/render_check.py --quick --quiet --fail-on-doc-drift

  site_smoke:
    name: site graph toggle smoke
    needs: [changes, artifact_regen]
    if: always() && needs.changes.outputs.run_site_smoke == 'true' && needs.artifact_regen.outputs.pushed_regen_commit != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust toolchain
        if: needs.changes.outputs.run_wasm_site_smoke == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        if: needs.changes.outputs.run_wasm_site_smoke == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: pr-gate-ubuntu-stable
          cache-on-failure: true

      - name: Install Zola
        run: |
          set -euo pipefail
          ZOLA_VERSION=0.19.2
          mkdir -p "${RUNNER_TEMP}/zola"
          curl -fsSL -o /tmp/zola.tar.gz \
            "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf /tmp/zola.tar.gz -C "${RUNNER_TEMP}/zola"
          echo "${RUNNER_TEMP}/zola" >> "${GITHUB_PATH}"
          "${RUNNER_TEMP}/zola/zola" --version

      - name: Install wasm-pack
        if: needs.changes.outputs.run_wasm_site_smoke == 'true'
        uses: ./.github/actions/install-wasm-pack

      - name: site graph toggle smoke
        run: |
          if [[ "${{ needs.changes.outputs.run_wasm_site_smoke }}" == "true" ]]; then
            ./scripts/site-smoke.sh --build-wasm --require-wasm
          else
            ./scripts/site-smoke.sh
          fi

      - name: Upload site smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-site-smoke-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            target/site-smoke
            site/public

  required_check:
    name: fmt-clippy-test-coverage-quick
    needs:
      - changes
      - artifact_regen
      - fmt
      - clippy
      - test
      - wasm
      - coverage
      - docs_examples_drift
      - site_smoke
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      statuses: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TARGET_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      RUN_FULL_GATE: ${{ needs.changes.outputs.run_full_gate }}
      RUN_DOCS_EXAMPLES_DRIFT: ${{ needs.changes.outputs.run_docs_examples_drift }}
      RUN_WASM_CHECK: ${{ needs.changes.outputs.run_wasm_check }}
      RUN_SITE_SMOKE: ${{ needs.changes.outputs.run_site_smoke }}
      REGEN_PUSHED: ${{ needs.artifact_regen.outputs.pushed_regen_commit }}
      IS_BOT_DEP_UPDATER: ${{ github.actor == 'dependabot[bot]' || github.actor == 'renovate[bot]' }}
      CHANGES_RESULT: ${{ needs.changes.result }}
      ARTIFACT_REGEN_RESULT: ${{ needs.artifact_regen.result }}
      FMT_RESULT: ${{ needs.fmt.result }}
      CLIPPY_RESULT: ${{ needs.clippy.result }}
      TEST_RESULT: ${{ needs.test.result }}
      WASM_RESULT: ${{ needs.wasm.result }}
      COVERAGE_RESULT: ${{ needs.coverage.result }}
      DOCS_EXAMPLES_RESULT: ${{ needs.docs_examples_drift.result }}
      SITE_SMOKE_RESULT: ${{ needs.site_smoke.result }}

    steps:
      - name: Summarize PR gate shards
        id: summarize
        shell: bash
        run: |
          set -euo pipefail

          echo "changes=${CHANGES_RESULT}"
          echo "run_full_gate=${RUN_FULL_GATE}"
          echo "run_docs_examples_drift=${RUN_DOCS_EXAMPLES_DRIFT}"
          echo "run_wasm_check=${RUN_WASM_CHECK}"
          echo "run_site_smoke=${RUN_SITE_SMOKE}"
          echo "regen_pushed=${REGEN_PUSHED}"
          echo "artifact_regen=${ARTIFACT_REGEN_RESULT}"
          echo "fmt=${FMT_RESULT}"
          echo "clippy=${CLIPPY_RESULT}"
          echo "test=${TEST_RESULT}"
          echo "wasm=${WASM_RESULT}"
          echo "coverage=${COVERAGE_RESULT}"
          echo "docs_examples=${DOCS_EXAMPLES_RESULT}"
          echo "site_smoke=${SITE_SMOKE_RESULT}"

          failures=()

          require_success() {
            local label="$1"
            local result="$2"
            if [[ "${result}" != "success" ]]; then
              failures+=("${label} expected success, got ${result}")
            fi
          }

          require_success "changes" "${CHANGES_RESULT}"

          if [[ "${REGEN_PUSHED}" == "true" ]]; then
            require_success "artifact regen" "${ARTIFACT_REGEN_RESULT}"
            if (( ${#failures[@]} == 0 )); then
              echo "state=success" >> "${GITHUB_OUTPUT}"
              echo "description=Artifact regeneration pushed a follow-up commit; rerun queued for updated head SHA." >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi

          if [[ "${RUN_FULL_GATE}" == "true" ]]; then
            require_success "fmt" "${FMT_RESULT}"
            require_success "clippy" "${CLIPPY_RESULT}"
            require_success "test" "${TEST_RESULT}"
            if [[ "${IS_BOT_DEP_UPDATER}" != "true" ]]; then
              require_success "coverage" "${COVERAGE_RESULT}"
            fi
          fi

          if [[ "${RUN_WASM_CHECK}" == "true" ]]; then
            require_success "wasm" "${WASM_RESULT}"
          fi

          if [[ "${RUN_DOCS_EXAMPLES_DRIFT}" == "true" ]]; then
            require_success "docs examples" "${DOCS_EXAMPLES_RESULT}"
          fi

          if [[ "${RUN_SITE_SMOKE}" == "true" ]]; then
            require_success "site smoke" "${SITE_SMOKE_RESULT}"
          fi

          if (( ${#failures[@]} > 0 )); then
            echo "state=failure" >> "${GITHUB_OUTPUT}"
            echo "description=PR gate failed; inspect workflow summary." >> "${GITHUB_OUTPUT}"
          else
            echo "state=success" >> "${GITHUB_OUTPUT}"
            echo "description=PR gate passed." >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish required status context
        shell: bash
        env:
          STATUS_STATE: ${{ steps.summarize.outputs.state }}
          STATUS_DESCRIPTION: ${{ steps.summarize.outputs.description }}
        run: |
          set -euo pipefail

          gh api \
            --method POST \
            "repos/${{ github.repository }}/statuses/${TARGET_SHA}" \
            -f state="${STATUS_STATE}" \
            -f context="fmt-clippy-test-coverage-quick" \
            -f description="${STATUS_DESCRIPTION}" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Fail when any required shard failed
        if: steps.summarize.outputs.state != 'success'
        shell: bash
        env:
          STATUS_DESCRIPTION: ${{ steps.summarize.outputs.description }}
        run: |
          printf 'PR gate failed:\n  - %s\n' "${STATUS_DESCRIPTION}" >&2
          exit 1
