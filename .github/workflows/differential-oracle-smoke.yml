name: Differential Oracle Smoke

on:
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/differential_oracle_smoke.py'
      - '.github/workflows/differential-oracle-smoke.yml'
  workflow_dispatch:

concurrency:
  group: oracle-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  oracle-smoke:
    name: oracle-smoke-deterministic
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Classify changed files
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          CHANGED_FILES="${RUNNER_TEMP}/changed-files.txt"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
            git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD > "${CHANGED_FILES}"
          else
            git ls-files > "${CHANGED_FILES}"
          fi

          # Use the canonical classify script so path rules stay in sync with
          # oracle.yml and pr-gate.yml (issue #455).
          python3 scripts/ci-classify-changes.py \
            --changed-files "${CHANGED_FILES}" \
            --github-output "${GITHUB_OUTPUT}" | tee "${RUNNER_TEMP}/ci-classification.txt"

          # workflow_dispatch always runs the smoke.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run_diff_oracle_smoke=true" >> "${GITHUB_OUTPUT}"
          fi

          # Derive full_oracle_covers from the classification output: true when
          # the full oracle (oracle.yml) would cover this change set but the
          # diff-smoke-specific flag is not independently set.
          SCRIPT_RUN_ORACLE="$(grep '^run_oracle=' "${RUNNER_TEMP}/ci-classification.txt" | cut -d= -f2 || echo false)"
          SCRIPT_DIFF_SMOKE="$(grep '^run_diff_oracle_smoke=' "${RUNNER_TEMP}/ci-classification.txt" | cut -d= -f2 || echo false)"
          if [[ "${SCRIPT_RUN_ORACLE}" == "true" && "${SCRIPT_DIFF_SMOKE}" != "true" ]]; then
            echo "full_oracle_covers=true" >> "${GITHUB_OUTPUT}"
          else
            echo "full_oracle_covers=false" >> "${GITHUB_OUTPUT}"
          fi

          echo "Changed files:"
          sed 's/^/  - /' "${CHANGED_FILES}"
          cat "${RUNNER_TEMP}/ci-classification.txt"

      - name: Skip duplicate oracle smoke
        if: steps.changes.outputs.run_diff_oracle_smoke != 'true'
        run: |
          if [[ "${{ steps.changes.outputs.full_oracle_covers }}" == "true" ]]; then
            echo "Skipping distro PlantUML smoke; differential-svg-oracle runs the pinned PlantUML JAR for this change set."
          else
            echo "No oracle-smoke-relevant changes detected; keeping oracle-smoke-deterministic green without installing Java/PlantUML."
          fi

      - name: Setup Rust toolchain
        if: steps.changes.outputs.run_diff_oracle_smoke == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        if: steps.changes.outputs.run_diff_oracle_smoke == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: oracle-smoke-ubuntu-stable
          cache-on-failure: true

      - name: Install PlantUML oracle runtime
        if: steps.changes.outputs.run_diff_oracle_smoke == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre-headless graphviz plantuml

      - name: Differential oracle smoke gate
        if: steps.changes.outputs.run_diff_oracle_smoke == 'true'
        run: python3 ./scripts/differential_oracle_smoke.py --quick --strict --quiet

      - name: Upload oracle smoke artifact
        if: always() && steps.changes.outputs.run_diff_oracle_smoke == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: oracle-smoke-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            docs/benchmarks/oracle_smoke_latest.json
