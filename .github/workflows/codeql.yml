name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '37 8 * * 2'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  CARGO_TARGET_DIR: ${{ github.workspace }}/target/codeql
  CODEQL_EXTRACTOR_RUST_OPTION_CARGO_TARGET_DIR: ${{ github.workspace }}/target/codeql
  CODEQL_EXTRACTOR_RUST_OPTION_CARGO_ALL_TARGETS: "true"
  CODEQL_EXTRACTOR_RUST_OPTION_EXTRACT_DEPENDENCIES_AS_SOURCE: "true"

jobs:
  analyze:
    name: analyze-rust
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src, rust-analyzer

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: codeql-ubuntu-stable
          workspaces: |
            . -> target/codeql
          cache-on-failure: true

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Enable sccache for Rust
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "${GITHUB_ENV}"
          echo "RUSTC_WRAPPER=sccache" >> "${GITHUB_ENV}"

      - name: Configure Rust extractor paths for CodeQL
        run: |
          set -euo pipefail
          sysroot="$(rustc --print sysroot)"
          echo "CODEQL_EXTRACTOR_RUST_OPTION_SYSROOT=${sysroot}" >> "${GITHUB_ENV}"

          sysroot_src="${sysroot}/lib/rustlib/src/rust/library"
          if [[ -d "${sysroot_src}" ]]; then
            echo "CODEQL_EXTRACTOR_RUST_OPTION_SYSROOT_SRC=${sysroot_src}" >> "${GITHUB_ENV}"
            echo "RUST_SRC_PATH=${sysroot_src}" >> "${GITHUB_ENV}"
            echo "Using sysroot source: ${sysroot_src}"
          fi

          rustc_src="${sysroot}/lib/rustlib/src/rust/compiler/rustc"
          if [[ -d "${rustc_src}" ]]; then
            echo "CODEQL_EXTRACTOR_RUST_OPTION_RUSTC_SRC=${rustc_src}" >> "${GITHUB_ENV}"
            echo "Using rustc source: ${rustc_src}"
          fi

          proc_macro_server="$(find "${sysroot}" -name rust-analyzer-proc-macro-srv -type f | head -n1)"
          if [[ -z "${proc_macro_server}" || ! -x "${proc_macro_server}" ]]; then
            echo "rust-analyzer proc macro server not found under ${sysroot}" >&2
            exit 1
          fi
          echo "CODEQL_EXTRACTOR_RUST_OPTION_PROC_MACRO_SERVER=${proc_macro_server}" >> "${GITHUB_ENV}"
          echo "Using proc macro server: ${proc_macro_server}"

      - name: Prepare Rust workspace
        run: |
          set -euo pipefail
          rustup show
          cargo metadata --format-version 1
          cargo check --workspace --all-features --all-targets

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
