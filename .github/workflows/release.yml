name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-ubuntu-stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Stage artifact
        run: cp target/release/puml puml-linux-x86_64

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: puml-linux-x86_64
          path: puml-linux-x86_64
          retention-days: 7

  build-macos:
    name: Build macOS x86_64
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-macos-stable

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-apple-darwin

      - name: Stage artifact
        run: cp target/x86_64-apple-darwin/release/puml puml-macos-x86_64

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: puml-macos-x86_64
          path: puml-macos-x86_64
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: puml-linux-x86_64

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: puml-macos-x86_64

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "puml ${{ github.ref_name }}" \
            --generate-notes \
            puml-linux-x86_64 \
            puml-macos-x86_64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
