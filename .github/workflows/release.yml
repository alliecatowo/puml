name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.name }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: puml-linux-x86_64
            binary: target/x86_64-unknown-linux-gnu/release/puml
          - name: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            artifact: puml-macos-x86_64
            binary: target/x86_64-apple-darwin/release/puml
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}-stable
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}" -p puml --bin puml

      - name: Stage artifact
        run: cp "${{ matrix.binary }}" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Linux binary
        uses: actions/download-artifact@v8
        with:
          name: puml-linux-x86_64

      - name: Download macOS binary
        uses: actions/download-artifact@v8
        with:
          name: puml-macos-x86_64

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "puml ${{ github.ref_name }}" \
            --generate-notes \
            puml-linux-x86_64 \
            puml-macos-x86_64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
