name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Ensure GitHub release exists
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure release exists for tag
        id: release
        env:
          TAG_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh release create "$TAG_NAME" \
            --title "puml $TAG_NAME" \
            --notes "Automated release $TAG_NAME" \
            --verify-tag
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

  build-and-publish:
    name: Build ${{ matrix.name }} binaries
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cli_binary: puml
            lsp_binary: puml-lsp
            cli_artifact: puml-linux-x86_64
            lsp_artifact: puml-lsp-linux-x86_64
            binary_ext: ""
          - name: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            cli_binary: puml
            lsp_binary: puml-lsp
            cli_artifact: puml-macos-x86_64
            lsp_artifact: puml-lsp-macos-x86_64
            binary_ext: ""
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            cli_binary: puml
            lsp_binary: puml-lsp
            cli_artifact: puml-windows-x86_64.exe
            lsp_artifact: puml-lsp-windows-x86_64.exe
            binary_ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}-stable
          cache-on-failure: true

      - name: Build release binaries
        run: |
          set -euo pipefail
          cargo build --release --locked --target "${{ matrix.target }}" -p puml --bins

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.cli_binary }}${{ matrix.binary_ext }}" "dist/${{ matrix.cli_artifact }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.lsp_binary }}${{ matrix.binary_ext }}" "dist/${{ matrix.lsp_artifact }}"

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          files: |
            dist/${{ matrix.cli_artifact }}
            dist/${{ matrix.lsp_artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wasm:
    name: Build and upload wasm artifact
    needs: create-release
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-wasm-ubuntu-stable
          cache-on-failure: true

      - name: Install wasm-pack
        uses: ./.github/actions/install-wasm-pack

      - name: Build and package wasm artifact
        id: package_wasm
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          OUT_DIR: dist
        run: |
          set -euo pipefail
          mkdir -p "$OUT_DIR"
          wasm-pack build --release --target web --out-dir "$OUT_DIR/puml-wasm"
          tar -czf "$OUT_DIR/puml-wasm-web-${RELEASE_TAG}.tar.gz" -C "$OUT_DIR" puml-wasm
          echo "artifact_path=$OUT_DIR/puml-wasm-web-${RELEASE_TAG}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload wasm artifact to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          files: ${{ steps.package_wasm.outputs.artifact_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-to-cargo:
    name: Publish crate
    runs-on: ubuntu-latest
    needs:
      - build-and-publish
      - build-wasm
    permissions:
      contents: read
    if: github.ref_type == 'tag'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches tag
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(python3 - <<'PY'
          import re
          from pathlib import Path

          text = Path("Cargo.toml").read_text()
          m = re.search(r'^version\s*=\s*"\d+\.\d+\.\d+"', text, re.M)
          if not m:
              raise SystemExit("No version line found in Cargo.toml")
          print(m.group(0).split('"')[1])
          PY
          )"
          if [ "$TAG_NAME" != "$CARGO_VERSION" ]; then
            echo "Tag version $TAG_NAME does not match Cargo version $CARGO_VERSION"
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "Missing CARGO_REGISTRY_TOKEN secret."
            exit 1
          fi
          cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"
