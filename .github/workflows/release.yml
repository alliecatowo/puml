name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and upload ${{ matrix.name }} release artifact
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: puml-linux-x86_64
            artifact_ext: tar.gz
            cli_binary: puml
            lsp_binary: puml-lsp
            binary_ext: ""
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            archive_name: puml-macos-x86_64
            artifact_ext: tar.gz
            cli_binary: puml
            lsp_binary: puml-lsp
            binary_ext: ""
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: puml-windows-x86_64
            artifact_ext: zip
            cli_binary: puml
            lsp_binary: puml-lsp
            binary_ext: ".exe"
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}-stable
          cache-on-failure: true

      - name: Build release binaries
        run: cargo build --release --locked --target "${{ matrix.target }}" -p puml --bins

      - name: Package artifact
        id: package_artifact
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ github.event.release.tag_name }}"
          OUTDIR="dist"
          STAGE_DIR="$OUTDIR/${{ matrix.archive_name }}-${VERSION}"
          ARCHIVE_PATH="$OUTDIR/${{ matrix.archive_name }}-${VERSION}.${{ matrix.artifact_ext }}"

          mkdir -p "$STAGE_DIR"

          cp "target/${{ matrix.target }}/release/${{ matrix.cli_binary }}${{ matrix.binary_ext }}" \
            "$STAGE_DIR/${{ matrix.cli_binary }}${{ matrix.binary_ext }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.lsp_binary }}${{ matrix.binary_ext }}" \
            "$STAGE_DIR/${{ matrix.lsp_binary }}${{ matrix.binary_ext }}"

          if [ "${{ matrix.artifact_ext }}" = "zip" ]; then
            tar -a -cf "$ARCHIVE_PATH" -C "$STAGE_DIR" .
          else
            tar -czf "$ARCHIVE_PATH" -C "$STAGE_DIR" .
          fi

          echo "artifact_path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload artifact to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ${{ steps.package_artifact.outputs.artifact_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wasm:
    name: Build and upload wasm artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-and-upload]
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-wasm-ubuntu-stable
          cache-on-failure: true

      - name: Install wasm-pack
        uses: ./.github/actions/install-wasm-pack

      - name: Build and package wasm artifact
        id: package_wasm
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          OUT_DIR: dist
        run: |
          set -euo pipefail
          mkdir -p "$OUT_DIR"
          wasm-pack build --release --target web --out-dir "$OUT_DIR/puml-wasm"
          tar -czf "$OUT_DIR/puml-wasm-web-${RELEASE_TAG}.tar.gz" -C "$OUT_DIR" puml-wasm
          echo "artifact_path=$OUT_DIR/puml-wasm-web-${RELEASE_TAG}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload wasm artifact to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ${{ steps.package_wasm.outputs.artifact_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-to-cargo:
    name: Publish crate to crates.io
    runs-on: ubuntu-latest
    if: github.event.release.prerelease == false
    needs: [build-and-upload, build-wasm]
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Cargo version matches release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          TAG_VERSION="${RELEASE_TAG#v}"
          CARGO_VERSION="$(python3 - <<'PY'
import tomllib
from pathlib import Path

cfg = tomllib.loads(Path('Cargo.toml').read_text())
print(cfg['package']['version'])
PY
)"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Release tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)."
            echo "Ensure release automation updated Cargo.toml before publishing."
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"
