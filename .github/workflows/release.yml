name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.name }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cli_binary: puml
            lsp_binary: puml-lsp
            cli_artifact: puml-linux-x86_64
            lsp_artifact: puml-lsp-linux-x86_64
          - name: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            cli_binary: puml
            lsp_binary: puml-lsp
            cli_artifact: puml-macos-x86_64
            lsp_artifact: puml-lsp-macos-x86_64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}-stable
          cache-on-failure: true

      - name: Build release binaries
        run: |
          set -euo pipefail
          cargo build --release --locked --target "${{ matrix.target }}" -p puml --bins

      - name: Stage release artifacts
        run: |
          set -euo pipefail
          cp "target/${{ matrix.target }}/release/${{ matrix.cli_binary }}" "${{ matrix.cli_artifact }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.lsp_binary }}" "${{ matrix.lsp_artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.cli_artifact }}
          path: |
            ${{ matrix.cli_artifact }}
            ${{ matrix.lsp_artifact }}
          retention-days: 7

  build-wasm:
    name: build-wasm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-wasm-ubuntu-stable
          cache-on-failure: true

      - name: Install wasm-pack
        uses: ./.github/actions/install-wasm-pack

      - name: Build puml-wasm
        run: |
          set -euo pipefail
          wasm-pack build --release --target web --out-dir dist crates/puml-wasm
          mkdir -p stage
          mv dist stage/puml-wasm
          tar -czf puml-wasm-web.tar.gz -C stage puml-wasm

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v7
        with:
          name: puml-wasm-web
          path: puml-wasm-web.tar.gz
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, build-wasm]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Linux CLI/LSP binary
        uses: actions/download-artifact@v8
        with:
          name: puml-linux-x86_64

      - name: Download macOS CLI/LSP binary
        uses: actions/download-artifact@v8
        with:
          name: puml-macos-x86_64

      - name: Download wasm artifact
        uses: actions/download-artifact@v8
        with:
          name: puml-wasm-web

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "puml ${{ github.ref_name }}" \
            --generate-notes \
            puml-linux-x86_64 \
            puml-lsp-linux-x86_64 \
            puml-macos-x86_64 \
            puml-lsp-macos-x86_64 \
            puml-wasm-web.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
