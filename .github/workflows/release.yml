name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and upload ${{ matrix.name }} release artifact
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_ext: tar.gz
            archive_name: puml-linux-x86_64
            binary_name: puml
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact_ext: tar.gz
            archive_name: puml-macos-x86_64
            binary_name: puml
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_ext: zip
            archive_name: puml-windows-x86_64
            binary_name: puml.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}-stable
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}" -p puml --bin puml

      - name: Package artifact
        id: package_artifact
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ github.event.release.tag_name }}"
          OUTDIR="dist"
          mkdir -p "$OUTDIR"

          ARCHIVE_PATH="$OUTDIR/${{ matrix.archive_name }}-${VERSION}.${{ matrix.artifact_ext }}"

          if [ "${{ matrix.artifact_ext }}" = "zip" ]; then
            tar -a -cf "$ARCHIVE_PATH" -C "target/${{ matrix.target }}/release" "${{ matrix.binary_name }}"
          else
            tar -czf "$ARCHIVE_PATH" -C "target/${{ matrix.target }}/release" "${{ matrix.binary_name }}"
          fi

          echo "artifact_path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload artifact to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ${{ steps.package_artifact.outputs.artifact_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-to-cargo:
    name: Publish crate to crates.io
    runs-on: ubuntu-latest
    if: github.event.release.prerelease == false
    needs: [build-and-upload]
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Cargo version matches release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          TAG_VERSION="${RELEASE_TAG#v}"
          CARGO_VERSION="$(python3 - <<'PY'
import tomllib
from pathlib import Path

cfg = tomllib.loads(Path('Cargo.toml').read_text())
print(cfg['package']['version'])
PY
)"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Release tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)."
            echo "Ensure release automation updated Cargo.toml before publishing."
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"
