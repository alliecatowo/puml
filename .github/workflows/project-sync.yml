name: Project Sync

on:
  issues:
    types: [opened, reopened, closed, labeled, unlabeled]
  pull_request:
    types: [opened, reopened, ready_for_review, converted_to_draft, synchronize, closed, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      content_url:
        description: Issue or pull request URL to sync
        required: true
        type: string
      status:
        description: Status to set
        required: false
        default: none
        type: choice
        options:
          - none
          - todo
          - in-progress
          - merging
          - done
      priority:
        description: Priority to set
        required: false
        default: none
        type: choice
        options:
          - none
          - P0
          - P1
          - P2
          - P3

permissions:
  contents: read
  issues: read
  pull-requests: read
  repository-projects: write

concurrency:
  group: project-sync-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  sync:
    name: sync-project-v2-fields
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PUML_PROJECT_TOKEN }}
      HAS_PROJECT_TOKEN: ${{ secrets.PUML_PROJECT_TOKEN != '' }}
      PROJECT_OWNER: alliecatowo
      PROJECT_NUMBER: "3"
      PROJECT_ID: PVT_kwHOBdlpmc4BX1zk
      STATUS_FIELD_ID: PVTSSF_lAHOBdlpmc4BX1zkzhS_7BE
      STATUS_TODO_ID: 332edcb8
      STATUS_IN_PROGRESS_ID: 867a988e
      STATUS_MERGING_ID: d4aa3b22
      STATUS_DONE_ID: c603c19d
      PRIORITY_FIELD_ID: PVTSSF_lAHOBdlpmc4BX1zkzhS_7FE
      PRIORITY_P0_ID: 5f502b32
      PRIORITY_P1_ID: e87779b3
      PRIORITY_P2_ID: 011502f5
      PRIORITY_P3_ID: e085bc1a
    steps:
      - name: Checkout
        if: env.HAS_PROJECT_TOKEN == 'true'
        uses: actions/checkout@v6

      - name: Skip when project token is unavailable
        if: env.HAS_PROJECT_TOKEN != 'true'
        run: |
          echo "::warning title=Project sync skipped::PUML_PROJECT_TOKEN is not configured or is unavailable for this event. User-owned Projects v2 boards cannot be edited with the repository GITHUB_TOKEN."
          echo "This is expected for forks and token-limited agent runs. Maintainers can configure PUML_PROJECT_TOKEN with Projects v2 access; agents should continue using GitHub issues."

      - name: Sync issue or pull request to PUML project
        if: env.HAS_PROJECT_TOKEN == 'true' && github.event_name != 'workflow_dispatch'
        run: ./scripts/project-v2-event-sync.sh

      - name: Manual project sync
        if: env.HAS_PROJECT_TOKEN == 'true' && github.event_name == 'workflow_dispatch'
        run: >
          ./scripts/project-v2-event-sync.sh
          --content-url "${{ inputs.content_url }}"
          --status "${{ inputs.status }}"
          --priority "${{ inputs.priority }}"
