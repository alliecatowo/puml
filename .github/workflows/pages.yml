# Build and deploy the static documentation + studio site to GitHub Pages.
#
# Output goes to https://alliecatowo.github.io/puml/ under the project page.
# The site is regenerated from:
#   - docs/examples/  (the rendered diagram corpus, mirrored into site/static/examples/)
#   - stdlib/         (published as site/static/stdlib/ so browser can fetch !includes)
#   - docs/specs/     (mirrored into site/content/developer/specs/)
#   - site/           (Zola config, templates, content, sass, static assets)

name: pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/build-site.mjs'
      - 'scripts/mirror-specs.mjs'
      - 'docs/examples/**'
      - 'docs/specs/**'
      - 'stdlib/**'
      - 'src/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/actions/install-wasm-pack/action.yml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up Rust (stable + wasm32 target)
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-pages-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-pages-

      - name: Install wasm-pack
        uses: ./.github/actions/install-wasm-pack

      - name: Build puml-wasm renderer
        run: wasm-pack build --release --target web --out-dir ../../site/static/wasm crates/puml-wasm

      - name: Install Zola
        run: |
          set -euo pipefail
          ZOLA_VERSION=0.19.2
          curl -fsSL -o /tmp/zola.tar.gz \
            "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          sudo tar -xzf /tmp/zola.tar.gz -C /usr/local/bin/
          zola --version

      - name: Build puml CLI binary
        run: cargo build --release

      - name: Regenerate diagram artifacts
        run: |
          set -euo pipefail
          PUML_BIN="./target/release/puml"

          # Regenerate SVG and PNG for all .puml files in docs/examples/ and docs/diagrams/
          for puml_file in $(find docs/examples docs/diagrams -name "*.puml" | sort); do
            base="${puml_file%.puml}"
            echo "Rendering ${puml_file} → ${base}.svg and ${base}.png"
            "${PUML_BIN}" "${puml_file}" -o "${base}.svg"
            "${PUML_BIN}" "${puml_file}" -o "${base}.png"
          done

          # Regenerate markdown snippet diagrams
          if [[ -f docs/examples/sequence/README.md ]]; then
            echo "Rendering markdown snippets from docs/examples/sequence/README.md"
            "${PUML_BIN}" --from-markdown --multi docs/examples/sequence/README.md
          fi

      - name: Mirror specs into site content
        run: node scripts/mirror-specs.mjs

      - name: Build example manifest and copy corpus into site/static
        run: node scripts/build-site.mjs

      - name: Zola build
        working-directory: site
        run: zola build

      - name: Site graph toggle smoke
        run: node site/scripts/smoke-inline-fence-preview.mjs site --require-wasm

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
