# Build and deploy the static documentation + studio site to GitHub Pages.
#
# Output goes to https://alliecatowo.github.io/puml/ under the project page.
# The site is regenerated from:
#   - docs/examples/  (the rendered diagram corpus, mirrored into site/static/examples/)
#   - docs/specs/     (mirrored into site/content/developer/specs/)
#   - site/           (Zola config, templates, content, sass, static assets)

name: pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/build-site.mjs'
      - 'scripts/mirror-specs.mjs'
      - 'docs/examples/**'
      - 'docs/specs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Zola
        run: |
          set -euo pipefail
          ZOLA_VERSION=0.19.2
          curl -fsSL -o /tmp/zola.tar.gz \
            "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          sudo tar -xzf /tmp/zola.tar.gz -C /usr/local/bin/
          zola --version

      - name: Mirror specs into site content
        run: node scripts/mirror-specs.mjs

      - name: Build example manifest and copy corpus into site/static
        run: node scripts/build-site.mjs

      - name: Zola build
        working-directory: site
        run: zola build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
