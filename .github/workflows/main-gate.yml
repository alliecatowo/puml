name: Main Gate

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  full-gate:
    name: full-gate-and-benchmark-publication
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: main-gate-ubuntu-stable
          cache-on-failure: true

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Full gate
        run: ./scripts/check-all.sh

      - name: wasm check
        run: cargo check --target wasm32-unknown-unknown -p puml-wasm

      - name: Build puml CLI binary for diagram regen
        run: cargo build --release

      - name: Regenerate diagram artifacts
        run: ./scripts/regen-artifacts.sh --force

      - name: Check for uncommitted diagram changes (post-regen)
        run: |
          set -euo pipefail
          # SVG artifacts are deterministic and are the source-of-truth contract for
          # docs drift. PNG bytes can vary across environments even when the SVG and
          # rendered content are equivalent, so we do not block main on raster-only
          # diffs here. Raster correctness is still covered by the visual regression
          # suite in the Full gate step above.
          stale_svg="$(git diff --name-only docs/examples docs/diagrams | grep '\.svg$' || true)"
          if [ -n "${stale_svg}" ]; then
            echo "ERROR: Diagram SVG artifacts are stale after regeneration." >&2
            echo "The committer must run 'scripts/regen-artifacts.sh --force' and commit before pushing to main." >&2
            echo "" >&2
            echo "Stale SVG files:" >&2
            printf '%s\n' "${stale_svg}" >&2
            exit 1
          fi

      - name: docs examples drift gate
        run: python3 ./scripts/render_check.py --quiet --fail-on-doc-drift --output docs/benchmarks/render_check_latest.json

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: main-benchmarks-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 90
          path: |
            docs/benchmarks/latest.md
            docs/benchmarks/latest.csv
            docs/benchmarks/latest.json
            docs/benchmarks/latest_trend.md
            docs/benchmarks/latest_trend.json
            docs/benchmarks/render_check_latest.json
            docs/benchmarks/baseline_full.json
            docs/benchmarks/baseline_quick.json

      - name: Upload render check report (persistent)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: render-check-report-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 90
          path: |
            docs/benchmarks/render_check_latest.json
            docs/benchmarks/latest_trend.json
            docs/benchmarks/latest_trend.md
