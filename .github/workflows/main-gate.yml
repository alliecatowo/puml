name: Main Gate

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  full-gate:
    name: full-gate-and-benchmark-publication
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: main-gate-ubuntu-stable
          cache-on-failure: true

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Full gate
        run: ./scripts/check-all.sh

      - name: docs examples drift gate
        run: python3 ./scripts/parity_harness.py --quiet --fail-on-doc-drift

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-benchmarks-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 90
          path: |
            docs/benchmarks/latest.md
            docs/benchmarks/latest.csv
            docs/benchmarks/latest.json
            docs/benchmarks/latest_trend.md
            docs/benchmarks/latest_trend.json
            docs/benchmarks/parity_latest.json
            docs/benchmarks/baseline_full.json
            docs/benchmarks/baseline_quick.json

      - name: Upload parity report (persistent)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-report-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 90
          path: |
            docs/benchmarks/parity_latest.json
            docs/benchmarks/latest_trend.json
            docs/benchmarks/latest_trend.md

  oracle:
    name: oracle-differential-conformance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Non-required job: always runs but only enforces when JAR is present.
    continue-on-error: true
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
      RUST_BACKTRACE: 1
      # Set PUML_ORACLE_JAR in repo secrets to activate full oracle comparison.
      # When unset the script exits 0 immediately with a skip sentinel.
      PUML_ORACLE_JAR: ${{ secrets.PUML_ORACLE_JAR_PATH || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: oracle-ubuntu-stable
          cache-on-failure: true

      - name: Run oracle differential script
        id: oracle
        run: |
          set +e
          set -o pipefail
          bash ./scripts/oracle.sh \
            --corpus-dir tests/fixtures \
            | tee /tmp/oracle_stdout.json
          ORACLE_EXIT=${PIPESTATUS[0]}
          set -e
          echo "exit_code=${ORACLE_EXIT}" >> "$GITHUB_OUTPUT"

          if [[ "${ORACLE_EXIT}" -eq 2 ]]; then
            echo "[oracle] HARD FAIL: match% < 50%" >&2
            exit 2
          fi
          exit 0

      - name: Upload oracle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-report-${{ github.sha }}
          if-no-files-found: ignore
          retention-days: 90
          path: |
            docs/benchmarks/oracle_report.json
            /tmp/oracle_stdout.json
