name: Main Gate

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  full-gate:
    name: full-gate-and-benchmark-publication
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: main-gate-ubuntu-stable
          cache-on-failure: true

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Full gate
        run: ./scripts/check-all.sh

      - name: wasm check
        run: cargo check --target wasm32-unknown-unknown -p puml-wasm

      - name: Build puml CLI binary for diagram regen
        run: cargo build --release

      - name: Regenerate diagram artifacts
        run: |
          set -euo pipefail
          PUML_BIN="./target/release/puml"

          # Regenerate SVG and PNG for all .puml files in docs/examples/ and docs/diagrams/
          for puml_file in $(find docs/examples docs/diagrams -name "*.puml" | sort); do
            base="${puml_file%.puml}"
            echo "Rendering ${puml_file} → ${base}.svg and ${base}.png"
            "${PUML_BIN}" "${puml_file}" -o "${base}.svg"
            "${PUML_BIN}" "${puml_file}" -o "${base}.png"
          done

          # Regenerate markdown snippet diagrams
          if [[ -f docs/examples/sequence/README.md ]]; then
            echo "Rendering markdown snippets from docs/examples/sequence/README.md"
            "${PUML_BIN}" --from-markdown --multi docs/examples/sequence/README.md
          fi

      - name: Check for uncommitted diagram changes (post-regen)
        run: |
          set -euo pipefail
          # If regen produced uncommitted changes, the committer forgot to regenerate
          git diff --exit-code docs/examples docs/diagrams || {
            echo "ERROR: Diagram artifacts are stale after regeneration." >&2
            echo "The committer must run diagram regeneration before pushing to main." >&2
            echo "" >&2
            echo "Stale files:" >&2
            git diff --name-only docs/examples docs/diagrams >&2
            exit 1
          }

      - name: docs examples drift gate
        run: python3 ./scripts/parity_harness.py --quiet --fail-on-doc-drift

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-benchmarks-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 90
          path: |
            docs/benchmarks/latest.md
            docs/benchmarks/latest.csv
            docs/benchmarks/latest.json
            docs/benchmarks/latest_trend.md
            docs/benchmarks/latest_trend.json
            docs/benchmarks/parity_latest.json
            docs/benchmarks/baseline_full.json
            docs/benchmarks/baseline_quick.json

      - name: Upload parity report (persistent)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-report-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 90
          path: |
            docs/benchmarks/parity_latest.json
            docs/benchmarks/latest_trend.json
            docs/benchmarks/latest_trend.md
