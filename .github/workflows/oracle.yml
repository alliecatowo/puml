name: Oracle — Differential Conformance vs Java PlantUML

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: oracle-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  oracle:
    name: differential-svg-oracle
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
      RUST_BACKTRACE: 1
      # Pinned PlantUML version — bump intentionally, never use "latest".
      PLANTUML_VERSION: "1.2024.7"
      PLANTUML_JAR: plantuml-1.2024.7.jar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 17 (Temurin LTS) — required to run the PlantUML reference JAR.
      # Not a runtime or build dependency of puml; CI-only for oracle comparison.
      - name: Setup JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Cache the JAR by pinned version so re-runs skip the download.
      - name: Cache PlantUML JAR
        id: cache-jar
        uses: actions/cache@v4
        with:
          path: ${{ env.PLANTUML_JAR }}
          key: plantuml-jar-${{ env.PLANTUML_VERSION }}

      # Download from the official GitHub Releases mirror (deterministic URL).
      - name: Download PlantUML JAR
        if: steps.cache-jar.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            "https://github.com/plantuml/plantuml/releases/download/v${PLANTUML_VERSION}/${PLANTUML_JAR}" \
            -o "${PLANTUML_JAR}"
          echo "[oracle] Downloaded plantuml-${PLANTUML_VERSION}.jar"

      - name: Verify JAR integrity and version
        run: |
          if [[ ! -f "${PLANTUML_JAR}" ]]; then
            echo "ERROR: JAR not found after download step" >&2
            exit 1
          fi
          JAR_SIZE=$(stat -c%s "${PLANTUML_JAR}")
          echo "[oracle] JAR size: ${JAR_SIZE} bytes"
          java -jar "${PLANTUML_JAR}" -version

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: oracle-ubuntu-stable
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release

      # Run the oracle shell conformance suite (fixture-by-fixture SVG diff).
      # Soft-fail thresholds:
      #   exit 0 = match% >= 80%  (PASS)
      #   exit 1 = 50% <= match% < 80%  (WARN, advisory)
      #   exit 2 = match% < 50%  (HARD FAIL)
      - name: Run oracle conformance suite (scripts/oracle.sh)
        id: oracle
        env:
          PUML_ORACLE_JAR: ${{ github.workspace }}/${{ env.PLANTUML_JAR }}
        run: |
          set +e
          ./scripts/oracle.sh
          ORACLE_EXIT=$?
          set -e

          echo "exit_code=${ORACLE_EXIT}" >> "${GITHUB_OUTPUT}"

          if [[ -f docs/benchmarks/oracle_report.json ]]; then
            TOTAL=$(jq  '.summary.total'      docs/benchmarks/oracle_report.json)
            MATCH=$(jq  '.summary.match'      docs/benchmarks/oracle_report.json)
            DRIFT=$(jq  '.summary.drift'      docs/benchmarks/oracle_report.json)
            PONLY=$(jq  '.summary.puml_only'  docs/benchmarks/oracle_report.json)
            JONLY=$(jq  '.summary.jar_only'   docs/benchmarks/oracle_report.json)
            BFAIL=$(jq  '.summary.both_fail'  docs/benchmarks/oracle_report.json)
            JVER=$(jq -r '.jar_version'       docs/benchmarks/oracle_report.json)

            if [[ "${TOTAL}" -gt 0 ]]; then
              MATCH_PCT=$(( MATCH * 100 / TOTAL ))
            else
              MATCH_PCT=0
            fi

            {
              echo "total=${TOTAL}"
              echo "match=${MATCH}"
              echo "drift=${DRIFT}"
              echo "puml_only=${PONLY}"
              echo "jar_only=${JONLY}"
              echo "both_fail=${BFAIL}"
              echo "match_pct=${MATCH_PCT}"
              echo "jar_version=${JVER}"
            } >> "${GITHUB_OUTPUT}"
          fi

          # exit 2 (<50% match) = hard CI failure; 0 and 1 are soft/advisory.
          if [[ "${ORACLE_EXIT}" -eq 2 ]]; then
            echo "[oracle] HARD FAIL: match% < 50%" >&2
            exit 2
          fi
          exit 0

      # Run the Rust oracle_smoke test suite with the real JAR.
      # --include-ignored unlocks JAR-gated tests that skip by default.
      - name: Run oracle_smoke test suite (cargo test --test oracle_smoke)
        id: cargo-oracle-smoke
        env:
          PUML_ORACLE_JAR: ${{ github.workspace }}/${{ env.PLANTUML_JAR }}
        run: |
          cargo test --test oracle_smoke -- --include-ignored 2>&1 | tee /tmp/oracle_smoke_test.log
          echo "cargo_exit_code=${PIPESTATUS[0]}" >> "${GITHUB_OUTPUT}"

      # Upload artifacts: oracle_report.json + test log
      - name: Upload oracle artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-report-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            docs/benchmarks/oracle_report.json
            /tmp/oracle_smoke_test.log

      # Post a Markdown summary comment on the PR.
      # Only runs when oracle data is present (skipped sentinel has no totals).
      - name: Comment on PR with oracle summary
        if: github.event_name == 'pull_request' && steps.oracle.outputs.total != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOTAL: ${{ steps.oracle.outputs.total }}
          MATCH: ${{ steps.oracle.outputs.match }}
          DRIFT: ${{ steps.oracle.outputs.drift }}
          PUML_ONLY: ${{ steps.oracle.outputs.puml_only }}
          JAR_ONLY: ${{ steps.oracle.outputs.jar_only }}
          BOTH_FAIL: ${{ steps.oracle.outputs.both_fail }}
          MATCH_PCT: ${{ steps.oracle.outputs.match_pct }}
          JAR_VERSION: ${{ steps.oracle.outputs.jar_version }}
          EXIT_CODE: ${{ steps.oracle.outputs.exit_code }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [[ "${EXIT_CODE}" -eq 0 ]]; then
            STATUS_ICON="[PASS]"
            STATUS_TEXT="PASS (>=80% match)"
          elif [[ "${EXIT_CODE}" -eq 1 ]]; then
            STATUS_ICON="[WARN]"
            STATUS_TEXT="WARN (50-79% match)"
          else
            STATUS_ICON="[FAIL]"
            STATUS_TEXT="FAIL (<50% match)"
          fi

          REPORT_URL="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"

          python3 - <<PYEOF
          import os, subprocess
          icon = os.environ['STATUS_ICON']
          text = os.environ['STATUS_TEXT']
          jver = os.environ['JAR_VERSION']
          total = os.environ['TOTAL']
          match = os.environ['MATCH']
          drift = os.environ['DRIFT']
          ponly = os.environ['PUML_ONLY']
          jonly = os.environ['JAR_ONLY']
          bfail = os.environ['BOTH_FAIL']
          mpct = os.environ['MATCH_PCT']
          run_num = os.environ['RUN_NUMBER']
          report_url = os.environ['REPORT_URL']
          pr_number = os.environ['PR_NUMBER']
          repo = os.environ['REPOSITORY']

          body = f"""## {icon} Oracle Conformance Report -- {text}

          | Metric | Value |
          |---|---|
          | PlantUML JAR version | `{jver}` |
          | Total fixtures | {total} |
          | Match (<=10% drift on all metrics) | {match} |
          | Drift (>10% on any metric) | {drift} |
          | puml-only (we render; JAR fails) | {ponly} |
          | jar-only (JAR renders; we fail) | {jonly} |
          | both-fail | {bfail} |
          | **Match %** | **{mpct}%** |

          Full report: [oracle-report-{run_num}]({report_url})

          > SVG layout divergence is advisory (puml uses a different layout engine). Parse failures on JAR-accepted files are hard failures.
          """

          subprocess.run(
            ['gh', 'pr', 'comment', pr_number, '--body', body, '--repo', repo],
            check=True
          )
          PYEOF
