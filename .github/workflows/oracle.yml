name: Oracle — Differential Conformance vs Java PlantUML

on:
  pull_request:
    branches:
      - main
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'crates/**'
      - 'tests/fixtures/**'
      - 'tests/oracle_smoke.rs'
      - 'docs/examples/**'
      - 'stdlib/**'
      - 'scripts/oracle.sh'
      - 'scripts/oracle_report_summary.py'
      - '.github/workflows/oracle.yml'
  push:
    branches:
      - main
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'crates/**'
      - 'tests/fixtures/**'
      - 'tests/oracle_smoke.rs'
      - 'docs/examples/**'
      - 'stdlib/**'
      - 'scripts/oracle.sh'
      - 'scripts/oracle_report_summary.py'
      - '.github/workflows/oracle.yml'
  workflow_dispatch:

concurrency:
  group: oracle-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  pages: write

jobs:
  oracle:
    name: differential-svg-oracle
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
      RUST_BACKTRACE: 1
      # Pinned PlantUML version — bump intentionally, never use "latest".
      PLANTUML_VERSION: "1.2024.7"
      PLANTUML_JAR: plantuml-1.2024.7.jar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Classify changed files
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          CHANGED_FILES="${RUNNER_TEMP}/changed-files.txt"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
            git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD > "${CHANGED_FILES}"
            run_oracle=false
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.event.before }}"
            git diff --name-only "${{ github.event.before }}" HEAD > "${CHANGED_FILES}"
            run_oracle=true
          else
            git ls-files > "${CHANGED_FILES}"
            run_oracle=true
          fi
          run_oracle_smoke=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            run_oracle_smoke=true
          fi

          while IFS= read -r file; do
            [[ -n "${file}" ]] || continue

            case "${file}" in
              Cargo.toml|Cargo.lock|src/*|crates/*|tests/fixtures/*|tests/oracle_smoke.rs|docs/examples/*|stdlib/*|scripts/oracle.sh|scripts/oracle_report_summary.py|.github/workflows/oracle.yml)
                run_oracle=true
                ;;
            esac

            case "${file}" in
              tests/oracle_smoke.rs|scripts/oracle.sh|scripts/oracle_report_summary.py|.github/workflows/oracle.yml)
                run_oracle_smoke=true
                ;;
            esac
          done < "${CHANGED_FILES}"

          if [[ ! -s "${CHANGED_FILES}" ]]; then
            run_oracle=true
            run_oracle_smoke=true
          fi

          {
            echo "run_oracle=${run_oracle}"
            echo "run_oracle_smoke=${run_oracle_smoke}"
          } >> "${GITHUB_OUTPUT}"

          echo "Changed files:"
          sed 's/^/  - /' "${CHANGED_FILES}"
          echo "run_oracle=${run_oracle}"
          echo "run_oracle_smoke=${run_oracle_smoke}"

      - name: Fast path for oracle-irrelevant changes
        if: steps.changes.outputs.run_oracle != 'true'
        run: |
          echo "No code, renderer, fixture, stdlib, or docs/example changes detected; skipping pinned PlantUML JAR oracle."

      # JDK 17 (Temurin LTS) — required to run the PlantUML reference JAR.
      # Not a runtime or build dependency of puml; CI-only for oracle comparison.
      - name: Setup JDK 17 (Temurin)
        if: steps.changes.outputs.run_oracle == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Cache the JAR by pinned version so re-runs skip the download.
      - name: Cache PlantUML JAR
        if: steps.changes.outputs.run_oracle == 'true'
        id: cache-jar
        uses: actions/cache@v4
        with:
          path: ${{ env.PLANTUML_JAR }}
          key: plantuml-jar-${{ env.PLANTUML_VERSION }}

      # Download from the official GitHub Releases mirror (deterministic URL).
      - name: Download PlantUML JAR
        if: steps.changes.outputs.run_oracle == 'true' && steps.cache-jar.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            "https://github.com/plantuml/plantuml/releases/download/v${PLANTUML_VERSION}/${PLANTUML_JAR}" \
            -o "${PLANTUML_JAR}"
          echo "[oracle] Downloaded plantuml-${PLANTUML_VERSION}.jar"

      - name: Verify JAR integrity and version
        if: steps.changes.outputs.run_oracle == 'true'
        run: |
          if [[ ! -f "${PLANTUML_JAR}" ]]; then
            echo "ERROR: JAR not found after download step" >&2
            exit 1
          fi
          JAR_SIZE=$(stat -c%s "${PLANTUML_JAR}")
          echo "[oracle] JAR size: ${JAR_SIZE} bytes"
          java -jar "${PLANTUML_JAR}" -version

      - name: Setup Rust toolchain
        if: steps.changes.outputs.run_oracle == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        if: steps.changes.outputs.run_oracle == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: oracle-ubuntu-stable
          cache-on-failure: true

      - name: Build release binary
        if: steps.changes.outputs.run_oracle == 'true'
        run: cargo build --release

      # Run the oracle shell conformance suite (fixture-by-fixture SVG diff).
      # Broad corpus thresholds:
      #   exit 0 = match% >= 80%  (PASS)
      #   exit 1 = 50% <= match% < 80%  (WARN, advisory)
      #   exit 2 = match% < 50%  (HARD FAIL)
      #   exit 3 = promoted fixture regression  (HARD FAIL)
      - name: Run oracle conformance suite (scripts/oracle.sh)
        if: steps.changes.outputs.run_oracle == 'true'
        id: oracle
        env:
          PUML_ORACLE_JAR: ${{ github.workspace }}/${{ env.PLANTUML_JAR }}
        run: |
          set +e
          ./scripts/oracle.sh
          ORACLE_EXIT=$?
          set -e

          echo "exit_code=${ORACLE_EXIT}" >> "${GITHUB_OUTPUT}"

          if [[ -f docs/benchmarks/oracle_report.json ]]; then
            TOTAL=$(jq  '.summary.total'      docs/benchmarks/oracle_report.json)
            MATCH=$(jq  '.summary.match'      docs/benchmarks/oracle_report.json)
            DRIFT=$(jq  '.summary.drift'      docs/benchmarks/oracle_report.json)
            PONLY=$(jq  '.summary.puml_only'  docs/benchmarks/oracle_report.json)
            JONLY=$(jq  '.summary.jar_only'   docs/benchmarks/oracle_report.json)
            BFAIL=$(jq  '.summary.both_fail'  docs/benchmarks/oracle_report.json)
            JVER=$(jq -r '.jar_version'       docs/benchmarks/oracle_report.json)

            if [[ "${TOTAL}" -gt 0 ]]; then
              MATCH_PCT=$(( MATCH * 100 / TOTAL ))
            else
              MATCH_PCT=0
            fi

            {
              echo "total=${TOTAL}"
              echo "match=${MATCH}"
              echo "drift=${DRIFT}"
              echo "puml_only=${PONLY}"
              echo "jar_only=${JONLY}"
              echo "both_fail=${BFAIL}"
              echo "match_pct=${MATCH_PCT}"
              echo "jar_version=${JVER}"
            } >> "${GITHUB_OUTPUT}"
          fi

          # exit 2 (<50% match) and exit 3 (promoted fixture regression) are
          # hard CI failures; 0 and 1 are broad-corpus advisory/pass statuses.
          if [[ "${ORACLE_EXIT}" -eq 2 ]]; then
            echo "[oracle] HARD FAIL: match% < 50%" >&2
            exit 2
          fi
          if [[ "${ORACLE_EXIT}" -eq 3 ]]; then
            echo "[oracle] HARD FAIL: promoted oracle fixture gate failed" >&2
            exit 3
          fi
          exit 0

      - name: Publish oracle report summary
        if: always() && steps.changes.outputs.run_oracle == 'true'
        id: oracle-summary
        run: |
          if [[ ! -f docs/benchmarks/oracle_report.json ]]; then
            echo "Oracle JSON report was not produced; skipping summary publication."
            exit 0
          fi

          python3 scripts/oracle_report_summary.py \
            --input docs/benchmarks/oracle_report.json \
            --markdown docs/benchmarks/oracle_report.md \
            --json docs/benchmarks/oracle_report_summary.json \
            --pages-dir target/oracle-report-pages

          cat docs/benchmarks/oracle_report.md >> "${GITHUB_STEP_SUMMARY}"

      # Run the oracle_smoke sentinel tests only for manual runs and changes
      # to the oracle workflow/script/test files (no --include-ignored).
      # The oracle_report_schema_is_stable test is #[ignore] gated because it
      # re-invokes oracle.sh over the full fixture corpus, which is redundant
      # and slow in CI (we already ran oracle.sh above). The sentinel tests
      # verify skip-by-default behavior and schema contracts without Java.
      # continue-on-error: true so sentinel test failures do not block the PR
      # — the oracle.sh step above is the hard gate.
      - name: Run oracle_smoke sentinel tests (cargo test --test oracle_smoke)
        if: steps.changes.outputs.run_oracle == 'true' && steps.changes.outputs.run_oracle_smoke == 'true'
        id: cargo-oracle-smoke
        continue-on-error: true
        env:
          PUML_ORACLE_JAR: ${{ github.workspace }}/${{ env.PLANTUML_JAR }}
        run: |
          cargo test --test oracle_smoke 2>&1 | tee /tmp/oracle_smoke_test.log
          echo "cargo_exit_code=${PIPESTATUS[0]}" >> "${GITHUB_OUTPUT}"

      # Upload artifacts: oracle_report.json, plus the smoke log when run.
      - name: Upload oracle artifacts
        if: always() && steps.changes.outputs.run_oracle == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: oracle-report-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 90
          path: |
            docs/benchmarks/oracle_report.json
            docs/benchmarks/oracle_report_summary.json
            docs/benchmarks/oracle_report.md
            target/oracle-report-pages/**

      - name: Upload oracle Pages artifact
        if: always() && steps.changes.outputs.run_oracle == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          name: oracle-report-pages-${{ github.run_number }}
          path: target/oracle-report-pages

      - name: Upload oracle_smoke test log
        if: always() && steps.changes.outputs.run_oracle == 'true' && steps.changes.outputs.run_oracle_smoke == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: oracle-smoke-test-log-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 90
          path: /tmp/oracle_smoke_test.log

      # Post a Markdown summary comment on the PR.
      # Guarded: only when we have real oracle data (total is a non-null number).
      # The 'null' string guard is needed because GitHub Actions renders unset
      # step outputs as the string "null" rather than an empty string.
      - name: Comment on PR with oracle summary
        if: >-
          steps.changes.outputs.run_oracle == 'true' &&
          github.event_name == 'pull_request' &&
          steps.oracle.outputs.total != '' &&
          steps.oracle.outputs.total != 'null'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXIT_CODE="${{ steps.oracle.outputs.exit_code }}"
          TOTAL="${{ steps.oracle.outputs.total }}"
          MATCH="${{ steps.oracle.outputs.match }}"
          DRIFT="${{ steps.oracle.outputs.drift }}"
          PUML_ONLY="${{ steps.oracle.outputs.puml_only }}"
          JAR_ONLY="${{ steps.oracle.outputs.jar_only }}"
          BOTH_FAIL="${{ steps.oracle.outputs.both_fail }}"
          MATCH_PCT="${{ steps.oracle.outputs.match_pct }}"
          JAR_VERSION="${{ steps.oracle.outputs.jar_version }}"
          RUN_NUMBER="${{ github.run_number }}"
          RUN_ID="${{ github.run_id }}"
          SERVER_URL="${{ github.server_url }}"
          REPOSITORY="${{ github.repository }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          if [[ "${EXIT_CODE}" -eq 0 ]]; then
            STATUS="PASS (>=80% match)"
          elif [[ "${EXIT_CODE}" -eq 1 ]]; then
            STATUS="WARN (50-79% match)"
          else
            STATUS="FAIL (<50% match)"
          fi

          REPORT_URL="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"

          # Write body to a temp file to avoid any shell quoting issues.
          BODY_FILE="$(mktemp)"
          if [[ -f docs/benchmarks/oracle_report.md ]]; then
            cat docs/benchmarks/oracle_report.md > "${BODY_FILE}"
            {
              echo ""
              echo "Actions artifact: [oracle-report-${RUN_NUMBER}](${REPORT_URL})"
            } >> "${BODY_FILE}"
          else
            cat > "${BODY_FILE}" <<BODY_EOF
          ## Oracle Conformance Report -- ${STATUS}

          PlantUML JAR: ${JAR_VERSION}  |  Run: [oracle-report-${RUN_NUMBER}](${REPORT_URL})

          Total: ${TOTAL} | Match: ${MATCH} | Drift: ${DRIFT} | puml-only: ${PUML_ONLY} | jar-only: ${JAR_ONLY} | both-fail: ${BOTH_FAIL} | Match %: ${MATCH_PCT}%

          SVG layout divergence is advisory (puml uses a different layout engine). Parse failures on JAR-accepted files are hard failures.
          BODY_EOF
          fi

          gh pr comment "${PR_NUMBER}" \
            --body-file "${BODY_FILE}" \
            --repo "${REPOSITORY}"
          rm -f "${BODY_FILE}"
