[package]
name = "puml"
version = "0.1.0"
edition = "2021"
default-run = "puml"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
winnow = "0.7"
glob = "0.3"
resvg = "0.45"
tiny-skia = "0.11"
image = { version = "0.25", default-features = false, features = ["png"] }

[dev-dependencies]
assert_cmd = "2"
insta = { version = "1.43", features = ["json"] }
predicates = "3"
tempfile = "3"

[[bin]]
name = "puml-lsp"
path = "src/bin/puml-lsp.rs"
